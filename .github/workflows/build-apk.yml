name: Build Android APK

on:
  push:
    branches: [main]
    paths:
      - 'twa/**'
      - 'frontend/src/app/manifest.ts'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install bubblewrap
        run: npm install -g @bubblewrap/cli@1.24.1

      - name: Install Android SDK
        uses: android-actions/setup-android@v3

      - name: Restore or create signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          mkdir -p twa
          cd twa
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > android.keystore
            echo "Restored keystore from secret"
          else
            echo "No keystore secret set — generating a NEW one (first build)."
            KS_PW="${KEYSTORE_PASSWORD:-fanfic-ai-$(date +%s)}"
            KEY_PW="${KEY_PASSWORD:-$KS_PW}"
            ALIAS="${KEY_ALIAS:-android}"
            keytool -genkeypair -v \
              -keystore android.keystore \
              -alias "$ALIAS" \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KS_PW" -keypass "$KEY_PW" \
              -dname "CN=Fanfic AI, O=Fanfic AI, C=RU"
            echo "=========== SAVE THESE TO GITHUB SECRETS ==========="
            echo "ANDROID_KEYSTORE_B64 (paste value below):"
            base64 -w0 android.keystore
            echo ""
            echo "ANDROID_KEYSTORE_PASSWORD: $KS_PW"
            echo "ANDROID_KEY_PASSWORD: $KEY_PW"
            echo "ANDROID_KEY_ALIAS: $ALIAS"
            echo "===================================================="
            # Cache the pw for the next step
            echo "$KS_PW" > .keystore_pw
          fi

      - name: Print SHA-256 fingerprint (paste into assetlinks.json)
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cd twa
          KS_PW="${KEYSTORE_PASSWORD:-$(cat .keystore_pw 2>/dev/null)}"
          ALIAS="${KEY_ALIAS:-android}"
          echo "SHA-256 fingerprint:"
          keytool -list -v -keystore android.keystore -alias "$ALIAS" -storepass "$KS_PW" \
            | grep 'SHA256:' | head -1

      # bubblewrap init would be interactive; we ship a pre-generated
      # twa/twa-manifest.json in the repo so init is unnecessary. If the
      # file is missing we bail — it's cheaper to hand-edit the JSON than
      # to fight bubblewrap's stdin prompts on CI.
      - name: Verify twa-manifest.json exists
        run: |
          cd twa
          if [ ! -f twa-manifest.json ]; then
            echo "ERROR: twa/twa-manifest.json missing. Commit the file to the repo."
            exit 1
          fi
          echo "twa-manifest.json OK"
          cat twa-manifest.json

      # `bubblewrap build` also prompts for JDK/SDK install and keystore
      # passwords. Set BUBBLEWRAP_JDK_PATH / BUBBLEWRAP_ANDROID_SDK_PATH
      # env vars to point at the runner's tools so bubblewrap doesn't ask,
      # and feed passwords via stdin.
      - name: bubblewrap build
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cd twa
          KS_PW="${KEYSTORE_PASSWORD:-$(cat .keystore_pw 2>/dev/null)}"
          KEY_PW="${KEY_PASSWORD:-$KS_PW}"
          ALIAS="${KEY_ALIAS:-android}"

          # Write bubblewrap's llama.config so it skips the "install JDK?"
          # and "install Android SDK?" prompts entirely.
          mkdir -p "$HOME/.bubblewrap"
          cat > "$HOME/.bubblewrap/config.json" <<EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF

          # Bubblewrap build prompts (in order):
          #   1. "Would you like to regenerate your project?" — answer: No
          #   2. "Password for the Key Store" — our keystore pw
          #   3. "Password for the Key" — our key pw
          # Feed all three via stdin.
          printf 'No\n%s\n%s\n' "$KS_PW" "$KEY_PW" | \
            bubblewrap build \
              --skipPwaValidation \
              --signingKeyPath ./android.keystore \
              --signingKeyAlias "$ALIAS"

          echo ""
          echo "=== Generated files ==="
          ls -la *.apk *.aab 2>/dev/null || {
            echo "No APK/AAB produced. Directory listing:"
            ls -la
            exit 1
          }

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: fanfic-ai-apk
          path: twa/*.apk
          if-no-files-found: error

      - name: Upload AAB artifact (for Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: fanfic-ai-aab
          path: twa/*.aab
          if-no-files-found: warn
