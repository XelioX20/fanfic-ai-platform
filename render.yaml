services:
  - type: web
    name: fanfic-ai-backend
    runtime: python
    rootDir: backend
    buildCommand: cd ficbook-parser && pip install . && cd ../backend && pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: SECRET_KEY
        generateValue: true
      - key: FICBOOK_EMAIL
        sync: false
      - key: FICBOOK_PASSWORD
        sync: false
      - key: SCRAPER_API_KEY
        sync: false
      - key: REDIS_URL
        value: ""
      - key: KAFKA_BOOTSTRAP_SERVERS
        value: ""
      - key: CORS_ORIGINS
        value: '["*"]'
