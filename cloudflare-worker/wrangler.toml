name = "ficbook-proxy"
main = "src/index.ts"
compatibility_date = "2024-01-01"
workers_dev = true

# Workers AI binding — powers the /embed endpoint (bge-m3, 1024-dim) that
# the Render backend calls to vectorize fanfics for the recommendation
# system. Free tier renews its neuron budget daily.
[ai]
binding = "AI"

# Keep-alive + enrichment crons for the Render free-tier backend.
# - */10 : ping /health so the dyno never cold-starts (public reads are
#          edge-cached, so Render sees little traffic otherwise).
# - */15 : POST /internal/enrich/run to drain the enrichment queue
#          (parse + embed pending fics). Idempotent; doubles as a wake-up.
# Free plan allows 3 cron schedules; we use 2.
[triggers]
crons = ["*/10 * * * *", "*/15 * * * *"]

