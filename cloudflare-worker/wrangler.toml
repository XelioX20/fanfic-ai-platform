name = "ficbook-proxy"
main = "src/index.ts"
compatibility_date = "2024-01-01"
workers_dev = true

# Keep-alive pings for the Render free-tier backend.
# Render spins down free-tier services after 15 min of no traffic. The
# first request after spin-down takes 15-30 seconds to warm up. Public
# reads have been moved to CF Worker cache, so Render sees very little
# traffic — auth/login endpoints would suffer 30s cold-starts every
# time users don't visit for a while.
#
# We schedule a cron to hit /health every 10 minutes so the dyno stays
# awake continuously. Render's free tier allows this — the /health
# endpoint is dirt cheap and doesn't count against any quotas.
[triggers]
crons = ["*/10 * * * *"]
